<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet"> 
	<link rel="stylesheet" href="estilos.css">
	<title>POSTRES CECI</title>
</head>
<body>
	<div class="contenedor">
		<div class="contenedor-pizzas">
			<div class="card" style="background-image: url('./img/pasteles.jpg')">
				<div class="textos">
					<h3>Pasteles</h3>
					<p>$400.00</p>
				</div>
			</div>
			<div class="card" style="background-image: url('./img/tarta.jpg')">
				<div class="textos">
					<h3>Tartas</h3>
					<p>$300.00</p>
				</div>
			</div>
			<div class="card" style="background-image: url('./img/flan.jpg')">
				<div class="textos">
					<h3>Flan napolitano</h3>
					<p>$250.00</p>
				</div>
			</div>

			<div class="card" style="background-image: url('./img/cupcakes.jpg')">
				<div class="textos">
					<h3>Cupcakes - docena</h3>
					<p>$320.00</p>
				</div>
			</div>
			<div class="card" style="background-image: url('./img/donas.jpg')">
				<div class="textos">
					<h3>Donas decoradas - docena </h3>
					<p>$240.00</p>
				</div>
			</div>
			<div class="card" style="background-image: url('./img/fresas.jpg')">
				<div class="textos">
					<h3>Fresas con crema</h3>
					<p>$70.00</p>
				</div>
			</div>
		</div>

		<div class="banner" style="background-image: url('./img/banner.jpg')">
			<h3>Tamaños</h3>
			<ul>
				<li>Familiar</li>
				<li>Mediano</li>
				<li>Individual</li>
			</ul>
			<button class="boton">Hacer pedido</button>
		</div>
	</div>
</body>
</html>
